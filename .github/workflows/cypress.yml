name: Cypress E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests (LoginExpectation)
        run: npm run test:unit

  cypress-e2e:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: [electron, chrome, firefox]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress (${{ matrix.browser }})
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: npm run cypress:run
          browser: ${{ matrix.browser }}

      - name: Upload Mochawesome report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report-${{ matrix.browser }}
          path: |
            cypress/reports/*.html
            cypress/reports/*.json
          retention-days: 14

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-evidence-${{ matrix.browser }}
          path: |
            cypress/screenshots/**
            cypress/videos/**
          retention-days: 14
